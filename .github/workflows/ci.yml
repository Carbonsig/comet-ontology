name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Parse the comet-pcr extension TTL
        run: python -c "from rdflib import Graph; g=Graph().parse('extensions/comet-pcr.ttl',format='turtle'); print(len(g),'triples')"

      - name: Python registry + validator tests
        run: python test/test_registry.py

      - name: TS validator tests
        run: bun test test/validate.test.ts
